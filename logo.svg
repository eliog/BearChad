  <rect x="186" y="212" width="28" height="8" fill="#1a1a1a"/>
  <rect x="108" y="202" width="32" height="7" rx="2" fill="#ff8c3a" opacity="0.85"/>
  <rect x="222" y="202" width="32" height="7" rx="2" fill="#ff8c3a" opacity="0.85"/>

  <!-- Claw slash accent -->
  <g stroke="#fff2dc" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M 36 60 Q 70 90 96 122"/>
    <path d="M 70 36 Q 105 65 130 96"/>
    <path d="M 110 28 Q 140 56 162 84" stroke-width="4"/>
